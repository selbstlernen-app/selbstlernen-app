name: 🛠 Android CI / Build & Release APK

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write # allow creating/updating Releases & uploading assets
  actions: read # allow pulling marketplace actions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_release:
    runs-on: macos-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v5

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📥 Install dependencies
        run: flutter pub get

      - name: 🔨 Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: ✅ Run tests
        run: flutter test --coverage

      - name: 🏗️ Build APKs
        run: flutter build apk --release --split-per-abi

      - name: 🍏 Create Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ../../unsigned_app.ipa Payload

      - name: 📦 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/unsigned_app.ipa

      # ─────────────── ONLY ON TAGS ───────────────
      - name: 🏷️ Create or update Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1.16.0
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          artifacts: "build/app/outputs/flutter-apk/*.apk,build/unsigned_app.ipa"
          token: ${{ secrets.GITHUB_TOKEN }}
