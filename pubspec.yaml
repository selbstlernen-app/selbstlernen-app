name: srl_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none"

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  async: ^2.13.0
  auto_size_text: ^3.0.0

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Drift database
  drift: ^2.28.2

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Freezed
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0

  flutter_slidable: ^4.0.3
  flutter_riverpod: ^3.0.3
  fl_chart: ^1.1.1

  flutter_heatmap_calendar:
    git:
      url: https://github.com/madxox/flutter_heatmap_calendar.git
      ref: main

  intl: ^0.20.2

  path: ^1.9.1
  path_provider: ^2.1.5

  # Uuid
  uuid: ^4.5.1

  # Riverpod
  riverpod_annotation: ^3.0.3

  rxdart: ^0.28.0

  sqlite3_flutter_libs: ^0.5.41

  vibration: ^3.1.4
  google_fonts: ^6.3.2

  very_good_analysis: ^10.0.0

  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  app_settings: ^7.0.0
  wakelock_plus: ^1.4.0
  flutter_background_service: ^5.1.0
  pubspec_checker: ^1.3.0
  live_activities: ^2.4.5
  collection: ^1.19.1
  mockito: ^5.6.3
  introduction_screen: ^4.0.0
  flutter_native_splash: ^2.4.7

dev_dependencies:
  build_runner: ^2.6.0
  drift_dev: ^2.28.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^3.0.3
  flutter_launcher_icons: ^0.14.4

  # Testing
  mocktail: ^1.0.0

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

# Icons specified for Android and iOS
flutter_launcher_icons:
  image_path: "assets/launcher/android_foreground.png"

  ios: true
  remove_alpha_ios: true
  background_color_ios: "#F5F5F5"
  image_path_ios: "assets/launcher/ios.png"

  android: true
  image_path_android: "assets/launcher/android_foreground.png"
  adaptive_icon_background: "assets/launcher/android_background.png"
  adaptive_icon_foreground: "assets/launcher/android_foreground.png"

# Splash screen
flutter_native_splash:
  color: "#F5F5F5"
  color_dark: "#121212"
  image: assets/launcher/splash_icon-2.png

  android_12:
    # background color
    color: "#F5F5F5"
    color_dark: "#121212"

    image: assets/launcher/splash_icon-2.png
